<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jack Sutera - Software Engineer">
    <title>Jack Sutera | Software Engineer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="index-page">
    <nav class="nav">
        <div class="nav-left">
            <a href="index.html" style="font-weight: 700; color: var(--accent);">JS</a>
        </div>
        <div class="nav-right">
            <a href="index.html" style="margin-right: 20px;">PROJECTS</a>
            <a href="certs.html" style="margin-right: 20px;">CERTS</a>
            <a href="./assets/resume.pdf" download>RESUME</a>
        </div>
    </nav>

    <div id="canvas">
        <!-- PROFILE ARTIFACT -->
        <div class="artifact artifact--profile" style="top: 15%; left: 5%;" data-artifact="profile">
            <div style="display: flex; align-items: center; margin-bottom: 16px;">
                <div style="width: 60px; height: 60px; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); margin-right: 16px;">
                    JS
                </div>
                <div>
                    <h2 id="profile-name" style="font-family: 'Space Mono', monospace; font-size: 18px; margin-bottom: 4px;"></h2>
                    <p id="profile-title" style="font-size: 13px; color: var(--text-muted);"></p>
                </div>
            </div>
            <p id="profile-bio" style="font-size: 13px; line-height: 1.5; margin-bottom: 16px; color: var(--text-muted);"></p>
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                <a id="profile-github" href="#" target="_blank" rel="noopener noreferrer" style="width: 20px; height: 20px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" fill="#28c971"/>
                    </svg>
                </a>
                <a id="profile-linkedin" href="#" target="_blank" rel="noopener noreferrer" style="width: 20px; height: 20px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#28c971"/>
                    </svg>
                </a>
                <a id="profile-email" href="#" style="width: 20px; height: 20px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="#28c971"/>
                    </svg>
                </a>
            </div>
            <a id="profile-cv-btn" class="btn-primary" href="#" download style="display: inline-block; text-decoration: none; text-align: center;">Download CV</a>
        </div>

        <!-- PROJECT ARTIFACT -->
        <a id="project-card-link" href="#" class="artifact artifact--project" style="top: 10%; left: 42%; text-decoration: none; color: inherit;" data-artifact="project">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span class="badge" style="background: rgba(40, 201, 113, 0.2); color: var(--accent);">PROJECT</span>
                <span style="color: var(--accent); font-size: 16px; line-height: 1;">→</span>
            </div>
            <h3 id="project-title" style="font-family: 'Space Mono', monospace; font-size: 16px; margin-bottom: 8px; color: var(--accent);"></h3>
            <p id="project-description" style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"></p>
            <div id="project-tags" style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;"></div>
            <p id="project-year" style="font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace;"></p>
        </a>

        <!-- CERTS ARTIFACT -->
        <div class="artifact artifact--certs" style="top: 55%; left: 60%;" data-artifact="certs">
            <div style="margin-bottom: 12px;">
                <span class="badge" style="background: rgba(40, 201, 113, 0.2); color: var(--accent);">CERTS</span>
            </div>
            <p id="certs-count" style="font-size: 13px; font-family: 'Space Mono', monospace; color: var(--text); margin-bottom: 12px;"></p>
            <div id="certs-list" style="margin-bottom: 16px; font-size: 12px;"></div>
            <a href="certs.html" class="btn-ghost" style="display: inline-block; text-decoration: none; font-size: 12px; padding: 6px 12px;">View all</a>
        </div>

        <!-- TAG ARTIFACT -->
        <div class="artifact artifact--tag" style="top: 65%; left: 8%;" data-artifact="tag">
            <p style="font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent); margin-bottom: 6px;">currently building.</p>
            <p style="font-size: 11px; color: var(--text-muted); line-height: 1.4;">open to SWE roles — May 2026</p>
        </div>
    </div>

    <script src="content.js"></script>
    <script src="main.js"></script>
    <script>
        (function() {
            const data = window.PORTFOLIO_DATA;
            if (!data) return;

            const profile = data.profile;
            document.getElementById('profile-name').textContent = profile.name;
            document.getElementById('profile-title').textContent = profile.title;
            document.getElementById('profile-bio').textContent = profile.bio;
            document.getElementById('profile-github').href = profile.github;
            document.getElementById('profile-linkedin').href = profile.linkedin;
            document.getElementById('profile-email').href = `mailto:${profile.email}`;
            document.getElementById('profile-cv-btn').href = profile.resumePath;

            if (data.projects.length > 0) {
                const project = data.projects[0];
                document.getElementById('project-card-link').href = project.detailPage;
                document.getElementById('project-title').textContent = project.title;
                document.getElementById('project-description').textContent = project.description;
                document.getElementById('project-year').textContent = project.year;
                
                const tagsContainer = document.getElementById('project-tags');
                project.tags.forEach(tag => {
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.textContent = tag;
                    tagsContainer.appendChild(badge);
                });
            }

            const inProgressCount = data.certifications.filter(c => c.status === 'in-progress').length;
            const plannedCount = data.certifications.filter(c => c.status === 'planned').length;
            let countText = '';
            if (inProgressCount > 0) {
                countText += `${inProgressCount} in progress`;
            }
            if (plannedCount > 0) {
                if (countText) countText += ', ';
                countText += `${plannedCount} planned`;
            }
            document.getElementById('certs-count').textContent = countText;

            const certsList = document.getElementById('certs-list');
            data.certifications.forEach(cert => {
                const certItem = document.createElement('div');
                certItem.style.marginBottom = '8px';
                certItem.style.display = 'flex';
                certItem.style.alignItems = 'flex-start';
                certItem.style.gap = '8px';
                
                const dot = document.createElement('span');
                dot.style.width = '6px';
                dot.style.height = '6px';
                dot.style.borderRadius = '50%';
                dot.style.marginTop = '5px';
                dot.style.flexShrink = '0';
                dot.style.background = cert.status === 'in-progress' ? '#f59e0b' : '#6b7280';
                
                const title = document.createElement('span');
                title.textContent = cert.title;
                title.style.color = 'var(--text)';
                title.style.lineHeight = '1.4';
                
                certItem.appendChild(dot);
                certItem.appendChild(title);
                certsList.appendChild(certItem);
            });
        })();
    </script>
</body>
</html>
